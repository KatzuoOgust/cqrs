<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="cmd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="qry" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Dispatcher hub (center) -->
  <circle cx="64" cy="64" r="13" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="64" y="68.5" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#94a3b8">D</text>

  <!-- Command branch (left) -->
  <!-- connector line -->
  <line x1="36" y1="46" x2="52" y2="56" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <!-- arrowhead -->
  <polygon points="52,56 46,51 49,58" fill="#3b82f6"/>
  <!-- pill -->
  <rect x="10" y="34" width="28" height="22" rx="6" fill="url(#cmd)" filter="url(#glow)"/>
  <text x="24" y="48" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#fff">C</text>

  <!-- Query branch (right) -->
  <!-- connector line -->
  <line x1="92" y1="46" x2="76" y2="56" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
  <!-- arrowhead -->
  <polygon points="76,56 82,51 79,58" fill="#10b981"/>
  <!-- pill -->
  <rect x="90" y="34" width="28" height="22" rx="6" fill="url(#qry)" filter="url(#glow)"/>
  <text x="104" y="48" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#fff">Q</text>

  <!-- Event branch (bottom) -->
  <!-- connector line -->
  <line x1="64" y1="90" x2="64" y2="77" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- arrowhead -->
  <polygon points="64,77 60,83 68,83" fill="#f59e0b"/>
  <!-- pill -->
  <rect x="50" y="90" width="28" height="22" rx="6" fill="#f59e0b" filter="url(#glow)"/>
  <text x="64" y="104" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#1a1f2e">E</text>
</svg>
