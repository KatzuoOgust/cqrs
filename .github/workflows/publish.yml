name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Test
        run: make test

      - name: Pack
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          dotnet pack Cqrs.slnx -c Release -p:VersionPrefix=$VERSION --output ./artifacts/nupkgs

      - name: Push
        run: dotnet nuget push ./artifacts/nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
